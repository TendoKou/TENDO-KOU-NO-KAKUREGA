    <style>
        @keyframes move-bg {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c29 100%);
        }

        .bg-layer::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(100, 150, 255, 0.1) 25%, transparent 25%), 
                linear-gradient(-45deg, rgba(100, 150, 255, 0.1) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(100, 150, 255, 0.1) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(100, 150, 255, 0.1) 75%);
            background-size: 100px 100px;
            animation: move-bg 15s linear infinite;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: transparent;
        }

        body {
            font-family: sans-serif;
            color: #eee;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .my-header {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            object-fit: cover;
        }

        h1 {
            margin: 10px 0 30px 0;
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(138, 180, 248, 0.5);
        }

        .links {
            width: 100%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ccc;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 10px;
            border-radius: 12px;
            object-fit: cover;
            background-color: rgba(255, 255, 255, 0.05);
            filter: grayscale(20%);
        }

        .btn-full {
            grid-column: span 2;
            aspect-ratio: auto;
            flex-direction: row;
            font-size: 0.95rem;
            padding: 15px;
        }
        .btn-full .btn-icon { margin-bottom: 0; margin-right: 15px; }

        .btn-main { 
            border-color: rgba(100, 180, 255, 0.4); 
            background: rgba(100, 180, 255, 0.05); 
            color: #fff;
        }
        .btn-sub { border-color: rgba(255, 255, 255, 0.1); }
        .btn-contact { 
            border-color: rgba(0, 200, 150, 0.3); 
            background: rgba(0, 200, 150, 0.05); 
        }

        .btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-main:hover { box-shadow: 0 0 20px rgba(100, 180, 255, 0.2); }
        .btn-contact:hover { box-shadow: 0 0 20px rgba(0, 200, 150, 0.2); }

        .rules-link { margin-top: 40px; font-size: 0.9rem; }
        .rules-link a { color: #888; text-decoration: none; border-bottom: 1px solid #444; }
        .footer { margin-top: 40px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.2); }
    </style>
